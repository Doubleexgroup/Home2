<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doubleex Group</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  :root{
    --accent:#e63946;
    --text:#ffffff;
  }

  html, body {
    margin:0; padding:0; min-height:100vh;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    color:var(--text);
    overflow-x: hidden;
    width: 100%;
  }

  body{
    background:url("sfondogrigio.jpg") center/cover no-repeat fixed;
    display:flex; flex-direction:column;
  }

  main{
    flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:flex-start;
    text-align:center; padding:30px 0 10px;
    width: 100%;
    box-sizing: border-box;
  }

  /* ══ SCENA MOLECOLA ══ */
  .molecule-scene {
    position: relative;
    width: min(1100px, 96vw);
    height: min(1100px, 96vw);
    margin: 0 auto;
    flex-shrink: 0;
  }

  .orbit-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    overflow: visible;
    pointer-events: none;
    z-index: 1;
  }

  .orbit-path {
    display: none;
  }

  .connect-line, .particle {
    display: none;
  }

  /* ── NODO CENTRALE: ora 600px ── */
  .node-center {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: min(600px, 52.3vw); height: min(600px, 52.3vw);
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.10) 0%, rgba(255,255,255,0.02) 80%);
    border: 3px solid rgba(86,27,109,0.75);
    box-shadow:
      0 0 0 1px rgba(138,45,181,0.25),
      inset 0 0 18px rgba(86,27,109,0.18),
      0 0 18px rgba(86,27,109,0.30);
    backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    z-index: 5;
    animation: breathe 5s ease-in-out infinite alternate;
  }

  .node-center img {
    width: 80%;
    pointer-events: none;
    user-select: none;
    filter: drop-shadow(0 0 10px rgba(255,255,255,0.25));
  }

  @keyframes breathe {
    from { box-shadow: 0 0 0 1px rgba(138,45,181,0.25), inset 0 0 18px rgba(86,27,109,0.18), 0 0 20px rgba(86,27,109,0.25); }
    to   { box-shadow: 0 0 0 2px rgba(138,45,181,0.45), inset 0 0 22px rgba(86,27,109,0.22), 0 0 55px rgba(86,27,109,0.50); }
  }

  /* ── NODO SATELLITE — posizionato interamente da JS ── */
  .sat-node {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.09) 0%, rgba(255,255,255,0.02) 80%);
    /* Cerchio colorato uguale al logo centrale */
    border: 3px solid rgba(86,27,109,0.75);
    box-shadow:
      0 0 0 1px rgba(138,45,181,0.25),
      inset 0 0 18px rgba(86,27,109,0.18),
      0 0 18px rgba(86,27,109,0.30);
    backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    transition: box-shadow .3s, border-color .3s;
    cursor: pointer;
    text-decoration: none;
    pointer-events: all;
    z-index: 10;
    width: min(240px, 20.9vw); height: min(240px, 20.9vw);
    /* Il transform-origin deve essere il centro del nodo */
    transform: translate(-50%, -50%);
  }

  .sat-node:hover {
    border-color: rgba(138,45,181,0.95);
    box-shadow:
      0 0 0 2px rgba(138,45,181,0.50),
      0 0 35px rgba(138,45,181,0.55),
      0 0 70px rgba(86,27,109,0.25),
      inset 0 0 22px rgba(86,27,109,0.20);
  }

  .sat-node img {
    width: 78%;
    pointer-events: none;
    user-select: none;
    transition: filter .3s;
  }

  .sat-node:hover img {
    filter: drop-shadow(0 0 12px rgba(255,255,255,0.7));
  }

  .particle {
    fill: #8a2db5;
    filter: url(#glow);
  }

  /* ── FOOTER ── */
  footer{
    padding:0 20px 50px; text-align:center;
    background:transparent; backdrop-filter:blur(3px);
    color:#561b6d;
  }
  .footer-border{
    border-top:1px solid #561b6d;
    padding-top:12px; margin-bottom:10px;
  }
  .footer-section{ margin-bottom:14px; }
  .footer-section h3{ color:#561b6d; margin:0 0 10px; }
  .contact-item{
    color:#561b6d; margin-bottom:7px;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .contact-item a{ color:#561b6d; text-decoration:none; }
  .contact-item a:hover{ text-decoration:underline; color:#8a2db5; }
  .footer-bottom{
    border-top:1px solid rgba(86,27,109,0.25);
    padding-top:10px; font-size:.85rem; color:#561b6d;
  }
  .footer-bottom a{ cursor:pointer; color:#561b6d; text-decoration:none; }
  .footer-bottom a:hover{ color:#54196d; }

  /* ── MODAL ── */
  #modal{
    display:none; position:fixed; top:0; left:0;
    width:100%; height:100%; background:rgba(0,0,0,0.8);
    justify-content:center; align-items:center; z-index:9999;
  }
  .modal-box{
    background:#fff; color:#000; padding:20px;
    max-width:600px; border-radius:8px;
    max-height:80%; overflow:auto;
  }

  /* ── COOKIE ── */
  #cookieBanner{
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 320px;
    background: rgba(18, 8, 26, 0.82);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(86,27,109,0.55);
    border-radius: 18px;
    padding: 22px 22px 18px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.45), 0 0 0 1px rgba(138,45,181,0.12);
    z-index: 9999;
    display: none;
    flex-direction: column;
    gap: 16px;
    animation: cookieSlide .45s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes cookieSlide {
    from { opacity:0; transform: translateY(20px) scale(.97); }
    to   { opacity:1; transform: translateY(0)    scale(1);   }
  }
  #cookieBanner .cookie-icon {
    font-size: 1.5rem;
    margin-bottom: 2px;
  }
  #cookieBanner .cookie-title {
    font-size: .78rem;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: rgba(138,45,181,0.9);
    margin-bottom: 4px;
  }
  #cookieBanner .cookie-text {
    font-size: .82rem;
    line-height: 1.55;
    color: rgba(255,255,255,0.72);
  }
  #cookieBanner .cookie-actions {
    display: flex;
    gap: 10px;
    margin-top: 2px;
  }
  #cookieBanner .cookie-actions button {
    flex: 1;
    padding: 9px 0;
    border: none;
    border-radius: 10px;
    font-size: .82rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s, background .2s;
  }
  #cookieBanner .cookie-actions button:active {
    transform: scale(.96);
  }
  #cookieBanner .btn-accept {
    background: linear-gradient(135deg, #7b2fbe, #561b6d);
    color: #fff;
    box-shadow: 0 4px 14px rgba(86,27,109,0.45);
  }
  #cookieBanner .btn-accept:hover {
    background: linear-gradient(135deg, #9b3fe0, #6e22a0);
    box-shadow: 0 6px 20px rgba(86,27,109,0.65);
  }
  #cookieBanner .btn-reject {
    background: rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.55);
    border: 1px solid rgba(255,255,255,0.12) !important;
  }
  #cookieBanner .btn-reject:hover {
    background: rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.75);
  }
  @media(max-width:400px){
    #cookieBanner{ right:12px; bottom:12px; width: calc(100vw - 24px); }
  }

  /* ══ RESPONSIVE ══
     La scena usa sempre min(1100px, 96vw) come dimensione.
     Tutti gli elementi scalano proporzionalmente via JS (W/SCENE_BASE).
     Il CSS fissa solo la dimensione della scena e dei nodi per evitare
     layout shift prima che JS calcoli le posizioni.
  */

  /* Previene scroll orizzontale su qualsiasi schermo */
  html, body {
    overflow-x: hidden;
    width: 100%;
  }

  @media(max-width:1140px){
    .molecule-scene{ width:96vw; height:96vw; }
    .node-center{ width:52.3vw; height:52.3vw; }
    .sat-node{ width:20.9vw; height:20.9vw; }
  }
  @media(max-width:600px){
    main{ padding:12px 0 8px; }
    footer{ padding:0 12px 36px; font-size:14px; }
    .contact-item{ font-size:13px; }
  }
  @media(max-width:380px){
    main{ padding:8px 0 6px; }
  }
</style>
</head>
<body>

<main>
  <div class="molecule-scene" id="scene">

    <svg class="orbit-svg" id="orbitSvg" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <circle class="orbit-path" id="orbitCircle1" cx="550" cy="550" r="340"/>
      <circle class="orbit-path" id="orbitCircle2" cx="550" cy="550" r="430"/>
      <circle class="orbit-path" id="orbitCircle3" cx="550" cy="550" r="510"/>
      <line id="line1" class="connect-line"/>
      <line id="line2" class="connect-line" style="animation-delay:-3.3s"/>
      <line id="line3" class="connect-line" style="animation-delay:-6.6s"/>
      <circle class="particle" r="5" id="p1">
        <animateMotion id="am1" dur="4.5s" repeatCount="indefinite" calcMode="linear" keyPoints="0;1;0" keyTimes="0;0.5;1"/>
      </circle>
      <circle class="particle" r="5" id="p2">
        <animateMotion id="am2" dur="5.2s" repeatCount="indefinite" calcMode="linear" keyPoints="0;1;0" keyTimes="0;0.5;1"/>
      </circle>
      <circle class="particle" r="5" id="p3">
        <animateMotion id="am3" dur="5.8s" repeatCount="indefinite" calcMode="linear" keyPoints="0;1;0" keyTimes="0;0.5;1"/>
      </circle>
    </svg>

    <div class="node-center">
      <img src="Group2 no sfondo.png" alt="Doubleex Group">
    </div>

    <!-- Satelliti: niente orbit-arm, niente counterSpin CSS — tutto gestito da JS -->
    <a href="https://doubleexhome.com/" target="_blank" class="sat-node" id="sat1">
      <img src="Home2 no sfondo.png" alt="Doubleex Home">
    </a>
    <a href="https://www.romaprimeliving.it/" target="_blank" class="sat-node" id="sat2">
      <img src="Living-no-sfondo.png" alt="Roma Prime Living">
    </a>
    <a href="https://dinnerinthesky.it/" target="_blank" class="sat-node" id="sat3">
      <img src="dinner2 no sfondo.png" alt="Dinner in the Sky">
    </a>

  </div>
</main>

<footer>
  <div class="footer-border">
    <div class="footer-section">
      <h3>Contatti</h3>
      <div class="contact-item"><i class="fas fa-phone"></i> <a href="tel:+393755248477">+39 3755248477</a></div>
      <div class="contact-item"><i class="fas fa-at"></i> <a href="mailto:info@doubleexgroup.com">info@doubleexgroup.com</a></div>
      <div class="contact-item"><i class="fas fa-location-dot"></i> <a href="https://www.google.com/maps/search/?api=1&query=Via+Pomarico+58+00178+Roma" target="_blank" rel="noopener">Via Pomarico 58, 00178 Roma</a></div>
    </div>
    <div class="footer-bottom">
      © 2026 Doubleexgroup LTD |
      <a onclick="openModal('privacy')">Privacy</a> |
      <a onclick="openModal('cookie')">Cookie</a> |
      <a onclick="openModal('termini')">Termini</a>
    </div>
  </div>
</footer>

<div id="modal">
  <div class="modal-box">
    <h2 id="title"></h2>
    <div id="text"></div>
    <br>
    <button onclick="closeModal()">Chiudi</button>
  </div>
</div>

<div id="cookieBanner">
  <div>
    <div class="cookie-icon">🍪</div>
    <div class="cookie-title">Cookie &amp; Privacy</div>
    <div class="cookie-text">Utilizziamo cookie tecnici e, previo consenso, cookie di analisi e marketing per migliorare la tua esperienza.</div>
  </div>
  <div class="cookie-actions">
    <button class="btn-accept" onclick="acceptCookies()">Accetta</button>
    <button class="btn-reject" onclick="rejectCookies()">Rifiuta</button>
  </div>
</div>

<script>
/*
  Sistema planetario: ogni satellite ha il suo raggio orbitale e velocità propria.
  Scena base 1100px, rCenter = 300 (600/2).

  Raggi orbitali base (proporzioni tipo sistema solare — distanze crescenti):
    sat1 (interno):  R = 1100 * 0.31 ≈ 340   durata 55s  (più vicino, più veloce)
    sat2 (medio):    R = 1100 * 0.39 ≈ 430   durata 75s
    sat3 (esterno):  R = 1100 * 0.46 ≈ 510   durata 100s (più lontano, più lento)

  Angolo iniziale sfalsato per una composizione visivamente bilanciata.
*/

const PLANETS = [
  { id: 'sat1', lineId: 'line1', amId: 'am1', orbitBase: 0.37, orbitAmp: 0.09, phasePulse: 0,              duration: 100000 },
  { id: 'sat2', lineId: 'line2', amId: 'am2', orbitBase: 0.37, orbitAmp: 0.09, phasePulse: Math.PI * 2/3,  duration: 100000 },
  { id: 'sat3', lineId: 'line3', amId: 'am3', orbitBase: 0.37, orbitAmp: 0.09, phasePulse: Math.PI * 4/3,  duration: 100000 },
];
const START_ANGLES  = [0, Math.PI * 2/3, Math.PI * 4/3];
const PULSE_PERIOD  = 18000;
// minimo sicuro: rCenter(0.273) + rSat(0.109) + margine(0.015) ≈ 0.397 → arrotondato a 0.30 per lasciare spazio
const R_MIN_FACTOR  = 0.30;

const SCENE_BASE = 1100;

const orbitCircles = [
  document.getElementById('orbitCircle1'),
  document.getElementById('orbitCircle2'),
  document.getElementById('orbitCircle3'),
];

const scene = document.getElementById('scene');
let startTime = null;

function tick(ts) {
  if (!startTime) startTime = ts;

  const W  = scene.offsetWidth;
  const cx = W / 2;
  const cy = W / 2;
  const scale   = W / SCENE_BASE;
  const rCenter = 300 * scale;
  const elapsed = ts - startTime;

  PLANETS.forEach((p, i) => {
    const satEl  = document.getElementById(p.id);
    const lineEl = document.getElementById(p.lineId);
    const amEl   = document.getElementById(p.amId);
    const rSat   = satEl.offsetWidth / 2;

    // Raggio oscillante: si avvicina e allontana visibilmente
    const pulse   = Math.sin((elapsed / PULSE_PERIOD) * Math.PI * 2 + p.phasePulse);
    const R_raw   = W * (p.orbitBase + p.orbitAmp * pulse);
    // clamp: mai dentro il cerchio centrale+satellite, mai fuori dalla scena
    const R_min   = rCenter + rSat + 6;
    const R_MAX   = W * 0.5 - rSat - 6;
    const R       = Math.min(R_MAX, Math.max(R_min, R_raw));

    // Aggiorna il cerchio tratteggiato (nascosto ma utile per debug)
    orbitCircles[i].setAttribute('cx', cx);
    orbitCircles[i].setAttribute('cy', cy);
    orbitCircles[i].setAttribute('r',  R);

    const progress = (elapsed % p.duration) / p.duration;
    const angle    = progress * Math.PI * 2 + START_ANGLES[i] - Math.PI / 2;

    const sx = cx + R * Math.cos(angle);
    const sy = cy + R * Math.sin(angle);

    satEl.style.left = sx + 'px';
    satEl.style.top  = sy + 'px';

    const dx = sx - cx, dy = sy - cy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const ux = dx / dist, uy = dy / dist;

    const x1 = cx + ux * rCenter;
    const y1 = cy + uy * rCenter;
    const x2 = sx - ux * rSat;
    const y2 = sy - uy * rSat;

    lineEl.setAttribute('x1', x1); lineEl.setAttribute('y1', y1);
    lineEl.setAttribute('x2', x2); lineEl.setAttribute('y2', y2);
    amEl.setAttribute('path', `M ${x1},${y1} L ${x2},${y2}`);
  });

  requestAnimationFrame(tick);
}

requestAnimationFrame(tick);

/* ── Modal ── */
function openModal(type){
  const t = document.getElementById("title"), c = document.getElementById("text");
  if(type==="privacy"){ t.innerText="Privacy Policy"; c.innerHTML="Questo sito non raccoglie direttamente dati personali."; }
  if(type==="cookie") { t.innerText="Cookie Policy";  c.innerHTML="Il sito utilizza cookie tecnici necessari."; }
  if(type==="termini"){ t.innerText="Termini";        c.innerHTML="Questo sito ha finalità informativa."; }
  document.getElementById("modal").style.display="flex";
}
function closeModal(){ document.getElementById("modal").style.display="none"; }

/* ── Cookie banner ── */
function acceptCookies(){
  localStorage.setItem("cookies","accepted");
  hideCookieBanner();
}
function rejectCookies(){
  localStorage.setItem("cookies","rejected");
  hideCookieBanner();
}
function hideCookieBanner(){
  const b = document.getElementById("cookieBanner");
  b.style.transition = "opacity .3s, transform .3s";
  b.style.opacity = "0";
  b.style.transform = "translateY(16px) scale(.97)";
  setTimeout(() => b.style.display = "none", 320);
}
window.onload = function(){
  const status = localStorage.getItem("cookies");
  if(status !== "accepted" && status !== "rejected"){
    document.getElementById("cookieBanner").style.display = "flex";
  }
};
</script>
</body>
</html>
