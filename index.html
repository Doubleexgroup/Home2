<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Doubleex Group</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

html,body{
margin:0;
padding:0;
min-height:100vh;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
color:white;
}

body{
background:url("sfondogrigio.jpg") center/cover no-repeat fixed;
display:flex;
flex-direction:column;
}

/* MAIN */

main{

flex:1;

display:flex;

justify-content:center;

align-items:center;

padding-top:60px;

}

/* STRUTTURA MOLECOLA */

.molecule{

position:relative;

width:750px;

height:550px;

max-width:95vw;

}

/* LOGHI */

.logo{

position:absolute;

display:flex;

justify-content:center;

align-items:center;

}

.logo img{

transition:.35s;

}

.logo img:hover{

transform:scale(1.15);

filter:
drop-shadow(0 0 15px rgba(255,255,255,0.8))
drop-shadow(0 0 25px rgba(255,255,255,0.4));

}

/* POSIZIONI */

.main-logo{

top:0;

left:50%;

transform:translateX(-50%);

}

.main-logo img{

width:420px;

}

/* laterali */

.home{

left:60px;

top:220px;

}

.home img{

width:200px;

}

.roma{

right:60px;

top:220px;

}

.roma img{

width:200px;

}

/* basso */

.dinner{

bottom:0;

left:50%;

transform:translateX(-50%);

}

.dinner img{

width:260px;

}

/* LINEE MOLECOLA */

.line{

position:absolute;

background:rgba(255,255,255,0.3);

}

/* linee verticali */

.line1{

width:2px;

height:200px;

left:50%;

top:120px;

}

/* diagonali */

.line2{

width:240px;

height:2px;

top:220px;

left:190px;

transform:rotate(35deg);

}

.line3{

width:240px;

height:2px;

top:220px;

right:190px;

transform:rotate(-35deg);

}

/* linee verso dinner */

.line4{

width:240px;

height:2px;

bottom:150px;

left:190px;

transform:rotate(-35deg);

}

.line5{

width:240px;

height:2px;

bottom:150px;

right:190px;

transform:rotate(35deg);

}

/* FOOTER */

footer{

padding:35px 20px;

text-align:center;

background:transparent;

backdrop-filter:blur(3px);

color:#561b6d;

border-top:1px solid #561b6d;

margin-bottom:50px;

}

.footer-section{

margin-bottom:18px;

}

.footer-section h3{

margin-bottom:10px;

}

.contact-item{

margin-bottom:6px;

}

.footer-bottom{

border-top:1px solid rgba(255,255,255,0.2);

padding-top:10px;

font-size:0.85rem;

}

.footer-bottom a{

cursor:pointer;

color:#561b6d;

text-decoration:none;

}

.footer-bottom a:hover{

color:#54196d;

}

/* MODAL */

#modal{

display:none;

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:rgba(0,0,0,0.8);

justify-content:center;

align-items:center;

z-index:9999;

}

.modal-box{

background:#fff;

color:#000;

padding:20px;

max-width:600px;

border-radius:8px;

max-height:80%;

overflow:auto;

}

/* COOKIE */

#cookieBanner{

position:fixed;

bottom:0;

width:100%;

background:#111;

color:#fff;

padding:15px;

display:flex;

justify-content:space-between;

align-items:center;

flex-wrap:wrap;

z-index:9999;

}

.cookie-buttons button{

margin-left:10px;

padding:8px 12px;

border:none;

cursor:pointer;

}

.accept{

background:#2ecc71;

color:#fff;

}

.reject{

background:#e74c3c;

color:#fff;

}

</style>

</head>

<body>

<main>

<div class="molecule">

<div class="line line1"></div>
<div class="line line2"></div>
<div class="line line3"></div>
<div class="line line4"></div>
<div class="line line5"></div>

<a class="logo main-logo">
<img src="Group2 no sfondo.png">
</a>

<a href="https://doubleexhome.com" target="_blank" class="logo home">
<img src="Home2 no sfondo.png">
</a>

<a href="https://www.romaprimeliving.it" target="_blank" class="logo roma">
<img src="Romaliving2.png">
</a>

<a href="https://dinnerinthesky.it" target="_blank" class="logo dinner">
<img src="dinner2 no sfondo.png">
</a>

</div>

</main>

<footer>

<div class="footer-section">

<h3>Contatti</h3>

<div class="contact-item">
<i class="fas fa-phone"></i> +39 3755248477
</div>

<div class="contact-item">
<i class="fas fa-envelope"></i> info@doubleexgroup.com
</div>

<div class="contact-item">
<i class="fas fa-map-marker-alt"></i> Via Pomarico 58, 00178 Roma
</div>

</div>

<div class="footer-bottom">

© 2026 Doubleexgroup LTD |

<a onclick="openModal('privacy')">Privacy</a> |

<a onclick="openModal('cookie')">Cookie</a> |

<a onclick="openModal('termini')">Termini</a>

</div>

</footer>

<script>

function openModal(type){

let text="";

if(type==="privacy") text="Questo sito non raccoglie dati personali.";

if(type==="cookie") text="Il sito utilizza solo cookie tecnici.";

if(type==="termini") text="Questo sito ha finalità informativa.";

alert(text);

}

</script>

</body>
</html>
