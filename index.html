<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Doubleex Group</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:white;
text-align:center;
}

/* logo principale */

.header{
margin-top:40px;
margin-bottom:60px;
}

.header img{
width:260px;
}

/* struttura molecolare */

.molecule{
position:relative;
width:400px;
margin:auto;
}

/* linea verticale principale */

.molecule::before{
content:"";
position:absolute;
left:50%;
top:0;
width:3px;
height:100%;
background:black;
transform:translateX(-50%);
}

/* nodo */

.node{
position:relative;
margin:120px 0;
}

.node img{
width:120px;
display:block;
margin:auto;
z-index:2;
position:relative;
}

.node span{
display:block;
margin-top:10px;
font-weight:bold;
}

/* linee laterali curve */

.node::before{
content:"";
position:absolute;
width:120px;
height:60px;
border:3px solid black;
border-right:none;
border-bottom:none;
left:50%;
top:-60px;
transform:translateX(-100%);
border-radius:80px 0 0 0;
}

.node:nth-child(even)::before{
border:3px solid black;
border-left:none;
border-bottom:none;
left:50%;
transform:translateX(0);
border-radius:0 80px 0 0;
}

footer{
margin-top:120px;
color:#666;
font-size:14px;
}

</style>

</head>


<body>

<div class="header">
<img src="logo.png">
</div>


<div class="molecule">

<div class="node">
<img src="logo1.png">
<span>Doubleex Home</span>
</div>

<div class="node">
<img src="logo2.png">
<span>Doubleex AI</span>
</div>

<div class="node">
<img src="logo3.png">
<span>Doubleex Tech</span>
</div>

<div class="node">
<img src="logo4.png">
<span>Doubleex Media</span>
</div>

</div>


<footer>
© 2026 Doubleex Group
</footer>


</body>
</html>
