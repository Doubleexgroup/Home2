<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Doubleex Group</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
background:url("sfondogrigio.jpg") center/cover no-repeat fixed;
color:white;
display:flex;
flex-direction:column;
min-height:100vh;
}

main{

flex:1;

display:flex;

justify-content:center;

align-items:center;

padding-top:60px;

}

/* CONTAINER */

.molecule{

position:relative;

width:760px;

height:540px;

max-width:95vw;

}

/* LINEE SVG */

.connections{

position:absolute;

width:100%;

height:100%;

top:0;

left:0;

}

.connections line{

stroke:rgba(255,255,255,0.35);

stroke-width:2;

transition:0.4s;

}

/* GLOW QUANDO HOVER */

.molecule:hover .connections line{

stroke:rgba(255,255,255,0.6);

}

/* LOGHI */

.logo{

position:absolute;

display:flex;

justify-content:center;

align-items:center;

}

.logo img{

transition:0.35s;

}

.logo img:hover{

transform:scale(1.15);

filter:
drop-shadow(0 0 12px rgba(255,255,255,0.9))
drop-shadow(0 0 20px rgba(255,255,255,0.6));

}

/* POSIZIONI */

.main-logo{

top:0;

left:50%;

transform:translateX(-50%);

}

.main-logo img{

width:420px;

}

/* SINISTRA */

.home{

top:230px;

left:0;

}

.home img{

width:200px;

}

/* DESTRA */

.roma{

top:230px;

right:0;

}

.roma img{

width:200px;

}

/* BASSO */

.dinner{

bottom:0;

left:50%;

transform:translateX(-50%);

}

.dinner img{

width:260px;

}

/* FOOTER */

footer{

padding:35px 20px;

text-align:center;

color:#561b6d;

border-top:1px solid #561b6d;

margin-bottom:50px;

}

.footer-section{

margin-bottom:18px;

}

.contact-item{

margin-bottom:6px;

}

.footer-bottom{

border-top:1px solid rgba(255,255,255,0.2);

padding-top:10px;

font-size:0.85rem;

}

.footer-bottom a{

cursor:pointer;

color:#561b6d;

text-decoration:none;

}

.footer-bottom a:hover{

color:#54196d;

}

/* RESPONSIVE */

@media(max-width:700px){

.molecule{

height:480px;

}

.main-logo img{

width:260px;

}

.home img,.roma img{

width:140px;

}

.dinner img{

width:180px;

}

}

</style>

</head>

<body>

<main>

<div class="molecule">

<!-- LINEE MOLECOLARI -->

<svg class="connections" viewBox="0 0 760 540">

<line x1="380" y1="110" x2="100" y2="270"/>

<line x1="380" y1="110" x2="660" y2="270"/>

<line x1="100" y1="270" x2="380" y2="470"/>

<line x1="660" y1="270" x2="380" y2="470"/>

</svg>

<!-- LOGHI -->

<div class="logo main-logo">
<img src="Group2 no sfondo.png">
</div>

<a href="https://doubleexhome.com" target="_blank" class="logo home">
<img src="Home2 no sfondo.png">
</a>

<a href="https://www.romaprimeliving.it" target="_blank" class="logo roma">
<img src="Romaliving2.png">
</a>

<a href="https://dinnerinthesky.it" target="_blank" class="logo dinner">
<img src="dinner2 no sfondo.png">
</a>

</div>

</main>

<footer>

<div class="footer-section">

<h3>Contatti</h3>

<div class="contact-item">
<i class="fas fa-phone"></i> +39 3755248477
</div>

<div class="contact-item">
<i class="fas fa-envelope"></i> info@doubleexgroup.com
</div>

<div class="contact-item">
<i class="fas fa-map-marker-alt"></i> Via Pomarico 58, 00178 Roma
</div>

</div>

<div class="footer-bottom">

© 2026 Doubleexgroup LTD |

<a onclick="openModal('privacy')">Privacy</a> |

<a onclick="openModal('cookie')">Cookie</a> |

<a onclick="openModal('termini')">Termini</a>

</div>

</footer>

<script>

function openModal(type){

if(type==="privacy")
alert("Questo sito non raccoglie dati personali.");

if(type==="cookie")
alert("Il sito utilizza cookie tecnici necessari.");

if(type==="termini")
alert("Questo sito ha finalità informativa.");

}

</script>

</body>
</html>
