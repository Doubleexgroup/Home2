<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doubleex Group</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  :root{
    --accent:#e63946;
    --text:#ffffff;
  }

  html, body {
    margin:0; padding:0; min-height:100vh;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    color:var(--text);
    overflow-x: hidden;
    width: 100%;
  }

  body{
    background:url("sfondogrigio.jpg") center/cover no-repeat fixed;
    display:flex; flex-direction:column;
  }

  main{
    flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:flex-start;
    text-align:center; padding:30px 0 10px;
    width: 100%;
    box-sizing: border-box;
  }

  /* ══ SCENA MOLECOLA ══ */
  .molecule-scene {
    position: relative;
    width: min(1100px, 96vw);
    height: min(1100px, 96vw);
    margin: 0 auto;
    flex-shrink: 0;
  }

  .orbit-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    overflow: visible;
    pointer-events: none;
    z-index: 1;
  }

  .orbit-path {
    display: none;
  }

  .connect-line, .particle {
    display: none;
  }

  /* ── NODO CENTRALE ── */
  .node-center {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: min(600px, 52.3vw); height: min(600px, 52.3vw);
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.10) 0%, rgba(255,255,255,0.02) 80%);
    border: 3px solid rgba(86,27,109,0.75);
    box-shadow:
      0 0 0 1px rgba(138,45,181,0.25),
      inset 0 0 18px rgba(86,27,109,0.18),
      0 0 18px rgba(86,27,109,0.30);
    backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    z-index: 5;
    animation: breathe 5s ease-in-out infinite alternate;
  }

  .node-center img {
    width: 80%;
    pointer-events: none;
    user-select: none;
    filter: drop-shadow(0 0 10px rgba(255,255,255,0.25));
  }

  @keyframes breathe {
    from { box-shadow: 0 0 0 1px rgba(138,45,181,0.25), inset 0 0 18px rgba(86,27,109,0.18), 0 0 20px rgba(86,27,109,0.25); }
    to   { box-shadow: 0 0 0 2px rgba(138,45,181,0.45), inset 0 0 22px rgba(86,27,109,0.22), 0 0 55px rgba(86,27,109,0.50); }
  }

  /* ── NODO SATELLITE ── */
  .sat-node {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.09) 0%, rgba(255,255,255,0.02) 80%);
    border: 3px solid rgba(86,27,109,0.75);
    box-shadow:
      0 0 0 1px rgba(138,45,181,0.25),
      inset 0 0 18px rgba(86,27,109,0.18),
      0 0 18px rgba(86,27,109,0.30);
    backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    transition: box-shadow .3s, border-color .3s;
    cursor: pointer;
    text-decoration: none;
    pointer-events: all;
    z-index: 10;
    width: min(240px, 20.9vw); height: min(240px, 20.9vw);
    transform: translate(-50%, -50%);
  }

  .sat-node:hover {
    border-color: rgba(138,45,181,0.95);
    box-shadow:
      0 0 0 2px rgba(138,45,181,0.50),
      0 0 35px rgba(138,45,181,0.55),
      0 0 70px rgba(86,27,109,0.25),
      inset 0 0 22px rgba(86,27,109,0.20);
  }

  .sat-node img {
    width: 78%;
    pointer-events: none;
    user-select: none;
    transition: filter .3s;
  }

  /* Logo Living più grande */
  #sat2 img {
    width: 93%;
  }

  .sat-node:hover img {
    filter: drop-shadow(0 0 12px rgba(255,255,255,0.7));
  }

  .particle {
    fill: #8a2db5;
    filter: url(#glow);
  }

  }

    padding-top:12px; margin-bottom:10px;
  }
  .footer-section{ margin-bottom:14px; }
  .footer-section h3{ color:#561b6d; margin:0 0 10px; }
  .contact-item{
    color:#561b6d; margin-bottom:7px;

  .contact-item a:hover{ text-decoration:underline; color:#8a2db5; }
  .footer-bottom{
    border-top:1px solid rgba(86,27,109,0.25);

  }
  .footer-bottom a{ cursor:pointer; color:#561b6d; text-decoration:none; }

    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.65);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    justify-content: center;
    align-items: center;
    z-index: 9999;
    padding: 20px;
    box-sizing: border-box;
  }

  #modal.visible {
    display: flex;
    animation: modalFadeIn .3s cubic-bezier(.16,1,.3,1) both;
  }

  @keyframes modalFadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .modal-box {
    background: rgba(12, 5, 20, 0.88);
    border: 1px solid rgba(138, 45, 181, 0.45);
    border-radius: 20px;
    padding: 36px 40px 32px;
    max-width: 560px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow:
      0 0 0 1px rgba(138,45,181,0.15),
      0 24px 80px rgba(0,0,0,0.6),
      0 0 60px rgba(86,27,109,0.25),
      inset 0 1px 0 rgba(255,255,255,0.06);
    animation: modalSlideUp .35s cubic-bezier(.16,1,.3,1) both;
    position: relative;
  }

  @keyframes modalSlideUp {
    from { opacity: 0; transform: translateY(24px) scale(.97); }
    to   { opacity: 1; transform: translateY(0)    scale(1); }
  }

  .modal-box::-webkit-scrollbar { width: 4px; }
  .modal-box::-webkit-scrollbar-track { background: transparent; }
  .modal-box::-webkit-scrollbar-thumb { background: rgba(138,45,181,0.4); border-radius: 2px; }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    padding-bottom: 18px;
    border-bottom: 1px solid rgba(138,45,181,0.25);
  }

  .modal-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: rgba(138,45,181,0.18);
    border: 1px solid rgba(138,45,181,0.35);

    font-size: 16px;
    flex-shrink: 0;

  #modal-title {
    font-size: 1.15rem;
    font-weight: 600;
    letter-spacing: .02em;
    color: rgba(255,255,255,0.95);
    margin: 0 0 0 12px;
    flex: 1;

  #modal-text {
    color: rgba(255,255,255,0.72);

    justify-content: flex-end;

    color: #fff;

    font-weight: 600;

    box-shadow: 0 6px 22px rgba(86,27,109,0.65);

<body>

<main>
  <div class="molecule-scene" id="scene">

    <svg class="orbit-svg" id="orbitSvg" xmlns="http://www.w3.org/2000/svg">

<script>
/*
  Sistema planetario — velocità ridotta.
  Le duration sono ora 220s / 260s / 310s (circa 2.5x più lente rispetto alle precedenti 100s).
  Angoli iniziali sfalsati di 120° per una composizione bilanciata.
*/

const PLANETS = [
  { id: 'sat1', lineId: 'line1', amId: 'am1', orbitBase: 0.37, orbitAmp: 0.09, phasePulse: 0,              duration: 220000 },
  { id: 'sat2', lineId: 'line2', amId: 'am2', orbitBase: 0.37, orbitAmp: 0.09, phasePulse: Math.PI * 2/3,  duration: 260000 },
  { id: 'sat3', lineId: 'line3', amId: 'am3', orbitBase: 0.37, orbitAmp: 0.09, phasePulse: Math.PI * 4/3,  duration: 310000 },
];
const START_ANGLES = [0, Math.PI * 2/3, Math.PI * 4/3];
const PULSE_PERIOD = 18000;

const SCENE_BASE = 1100;

const orbitCircles = [
  document.getElementById('orbitCircle1'),
  document.getElementById('orbitCircle2'),
  document.getElementById('orbitCircle3'),
];

const scene = document.getElementById('scene');
let startTime = null;

function tick(ts) {
  if (!startTime) startTime = ts;

  const W  = scene.offsetWidth;
  const cx = W / 2;
  const cy = W / 2;
  const scale   = W / SCENE_BASE;
  const rCenter = 300 * scale;
  const elapsed = ts - startTime;

  PLANETS.forEach((p, i) => {
    const satEl  = document.getElementById(p.id);
    const lineEl = document.getElementById(p.lineId);
    const amEl   = document.getElementById(p.amId);
    const rSat   = satEl.offsetWidth / 2;

    const pulse   = Math.sin((elapsed / PULSE_PERIOD) * Math.PI * 2 + p.phasePulse);
    const R_raw   = W * (p.orbitBase + p.orbitAmp * pulse);
    const R_min   = rCenter + rSat + 6;
    const R_MAX   = W * 0.5 - rSat - 6;
    const R       = Math.min(R_MAX, Math.max(R_min, R_raw));

    orbitCircles[i].setAttribute('cx', cx);
    orbitCircles[i].setAttribute('cy', cy);
    orbitCircles[i].setAttribute('r',  R);

    const progress = (elapsed % p.duration) / p.duration;
    const angle    = progress * Math.PI * 2 + START_ANGLES[i] - Math.PI / 2;

    const sx = cx + R * Math.cos(angle);
    const sy = cy + R * Math.sin(angle);

    satEl.style.left = sx + 'px';
    satEl.style.top  = sy + 'px';

    const dx = sx - cx, dy = sy - cy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const ux = dx / dist, uy = dy / dist;

    const x1 = cx + ux * rCenter;
    const y1 = cy + uy * rCenter;
    const x2 = sx - ux * rSat;
    const y2 = sy - uy * rSat;

    lineEl.setAttribute('x1', x1); lineEl.setAttribute('y1', y1);
    lineEl.setAttribute('x2', x2); lineEl.setAttribute('y2', y2);
    amEl.setAttribute('path', `M ${x1},${y1} L ${x2},${y2}`);
  });

  requestAnimationFrame(tick);
}

requestAnimationFrame(tick);

      <p>Il presente sito è soggetto alla legge italiana. Per qualsiasi controversia è competente il foro di Roma.</p>
    `
  }
};

function openModal(type) {
  const content = MODAL_CONTENT[type];
  if (!content) return;
  document.getElementById('modal-icon').textContent = content.icon;
  document.getElementById('modal-title').textContent = content.title;
  document.getElementById('modal-text').innerHTML = content.html;
  const modal = document.getElementById('modal');
  modal.classList.add('visible');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  const modal = document.getElementById('modal');
  modal.classList.remove('visible');
  document.body.style.overflow = '';
}

function handleModalOutsideClick(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

/* ── Cookie banner ── */
function acceptCookies() {
  localStorage.setItem('doubleex_cookies', 'accepted');
  hideCookieBanner();
}

function rejectCookies() {
  localStorage.setItem('doubleex_cookies', 'rejected');
  hideCookieBanner();
}

function hideCookieBanner() {
  const b = document.getElementById('cookieBanner');
  b.style.transition = 'opacity .35s, transform .35s';
  b.style.opacity = '0';
  b.style.transform = 'translateY(16px) scale(.97)';
  setTimeout(() => { b.style.display = 'none'; }, 370);
}

function showCookieBanner() {
  const b = document.getElementById('cookieBanner');
  b.style.display = 'flex';
}

/*
  FIX COOKIE BANNER:
  Il banner non appariva perché il codice originale usava la chiave 'cookies'
  (troppo generica, poteva essere già settata da altri siti/script in localhost).
  Ora usiamo 'doubleex_cookies' come chiave univoca.
  Inoltre usiamo DOMContentLoaded che è più affidabile di window.onload
  per siti con risorse pesanti (immagini di sfondo grandi).
*/
document.addEventListener('DOMContentLoaded', function() {
  const status = localStorage.getItem('doubleex_cookies');
  if (status !== 'accepted' && status !== 'rejected') {
    // Piccolo delay per far terminare il primo render e rendere l'animazione visibile
    setTimeout(showCookieBanner, 600);
  }
});
</script>
