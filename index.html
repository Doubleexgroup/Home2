<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doubleex Group</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  :root{
    --accent:#e63946;
    --text:#ffffff;
  }

  html,body{
    margin:0; padding:0; min-height:100vh;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    color:var(--text);
  }

  body{
    background:url("sfondogrigio.jpg") center/cover no-repeat fixed;
    display:flex; flex-direction:column;
  }

  main{
    flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:flex-start;
    text-align:center; padding:40px 20px 20px;
  }

  /* ══════════════════════════════
     SCENA MOLECOLA
  ══════════════════════════════ */
  .molecule-scene {
    position: relative;
    width: 640px;
    height: 640px;
    max-width: 96vw;
    max-height: 96vw;
    margin: 0 auto 10px;
  }

  /* SVG orbite e linee — fondo */
  .orbit-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    overflow: visible;
    pointer-events: none;
    z-index: 1;
  }

  /* cerchio orbita tratteggiato */
  .orbit-path {
    fill: none;
    stroke: rgba(255,255,255,0.22);
    stroke-width: 1.2;
    stroke-dasharray: 6 5;
  }

  /* linee dal centro ai satelliti */
  .connect-line {
    stroke: #561b6d;
    stroke-width: 2;
    stroke-dasharray: 8 5;
    animation: dashFlow 10s linear infinite;
  }

  @keyframes dashFlow {
    to { stroke-dashoffset: -200; }
  }

  /* ── NODO CENTRALE ── */
  .node-center {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 260px; height: 260px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.10) 0%, rgba(255,255,255,0.02) 80%);
    border: 1px solid rgba(255,255,255,0.18);
    backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    z-index: 5;
    animation: breathe 5s ease-in-out infinite alternate;
  }

  .node-center img {
    width: 80%;
    pointer-events: none;
    user-select: none;
    filter: drop-shadow(0 0 8px rgba(255,255,255,0.25));
  }

  @keyframes breathe {
    from { box-shadow: 0 0 18px rgba(255,255,255,0.10); }
    to   { box-shadow: 0 0 38px rgba(255,255,255,0.28); }
  }

  /* ── BRACCIO ORBITANTE ── */
  .orbit-arm {
    position: absolute;
    top: 50%; left: 50%;
    width: 0; height: 0;
    transform-origin: 0 0;
    z-index: 10;
  }

  .orbit-arm-1 { animation: spin 70s linear infinite; }
  .orbit-arm-2 { animation: spin 70s linear infinite; animation-delay: calc(-70s / 3); }
  .orbit-arm-3 { animation: spin 70s linear infinite; animation-delay: calc(-70s * 2 / 3); }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* il nodo satellite — R = 220px */
  .sat-node {
    position: absolute;
    left: 135px;   /* 220 - 85 (metà 170px) */
    top: -85px;    /* - metà nodo */
    width: 170px; height: 170px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.09) 0%, rgba(255,255,255,0.02) 80%);
    border: 1px solid rgba(255,255,255,0.20);
    backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    /* contro-rotazione per tenere il logo dritto */
    animation: counterSpin 70s linear infinite;
    transition: box-shadow .3s;
    cursor: pointer;
    text-decoration: none;
    pointer-events: all;
    z-index: 10;
  }

  .orbit-arm-2 .sat-node { animation-delay: calc(-70s / 3); }
  .orbit-arm-3 .sat-node { animation-delay: calc(-70s * 2 / 3); }

  @keyframes counterSpin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(-360deg); }
  }

  .sat-node:hover {
    box-shadow: 0 0 28px rgba(255,255,255,0.50), 0 0 60px rgba(255,255,255,0.18);
  }

  .sat-node img {
    width: 78%;
    pointer-events: none;
    user-select: none;
    transition: filter .3s;
  }

  .sat-node:hover img {
    filter: drop-shadow(0 0 10px rgba(255,255,255,0.7));
  }

  /* ── PARTICELLE sulle linee ── */
  .particle {
    fill: #8a2db5;
    filter: url(#glow);
  }

  /* ── FOOTER ── */
  footer{
    padding:0 20px 50px; text-align:center;
    background:transparent; backdrop-filter:blur(3px);
    color:#561b6d;
  }
  .footer-border{
    border-top:1px solid #561b6d;
    padding-top:12px;
    margin-bottom:10px;
  }
  .footer-section{ margin-bottom:14px; }
  .footer-section h3{ color:#561b6d; margin:0 0 10px; }
  .contact-item{
    color:#561b6d; margin-bottom:7px;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .contact-item a{ color:#561b6d; text-decoration:none; }
  .contact-item a:hover{ text-decoration:underline; color:#8a2db5; }
  .footer-bottom{
    border-top:1px solid rgba(86,27,109,0.25);
    padding-top:10px; font-size:.85rem; color:#561b6d;
  }
  .footer-bottom a{ cursor:pointer; color:#561b6d; text-decoration:none; }
  .footer-bottom a:hover{ color:#54196d; }

  /* ── MODAL ── */
  #modal{
    display:none; position:fixed; top:0; left:0;
    width:100%; height:100%; background:rgba(0,0,0,0.8);
    justify-content:center; align-items:center; z-index:9999;
  }
  .modal-box{
    background:#fff; color:#000; padding:20px;
    max-width:600px; border-radius:8px;
    max-height:80%; overflow:auto;
  }

  /* ── COOKIE ── */
  #cookieBanner{
    position:fixed; bottom:0; width:100%;
    background:#111; color:#fff; padding:15px;
    display:flex; justify-content:space-between;
    align-items:center; flex-wrap:wrap; z-index:9999;
  }
  .cookie-buttons button{ margin-left:10px; padding:8px 12px; border:none; cursor:pointer; }
  .accept{ background:#2ecc71; color:#fff; }
  .reject{ background:#e74c3c; color:#fff; }

  /* ── RESPONSIVE ── */

  /* Tablet grande (900-1100px) */
  @media(max-width:1100px){
    .molecule-scene{ width:560px; height:560px; }
    .node-center{ width:220px; height:220px; }
    .sat-node{ width:145px; height:145px; left:115px; top:-72px; }
  }

  /* Tablet piccolo / landscape phone (600-900px) */
  @media(max-width:900px){
    .molecule-scene{ width:480px; height:480px; }
    .node-center{ width:190px; height:190px; }
    .sat-node{ width:125px; height:125px; left:98px; top:-62px; }
    main{ padding:30px 16px 16px; }
  }

  /* Smartphone (max 600px) */
  @media(max-width:600px){
    .molecule-scene{ width:340px; height:340px; }
    .node-center{ width:130px; height:130px; }
    .sat-node{ width:90px; height:90px; left:70px; top:-45px; }
    main{ padding:20px 10px 10px; }
    footer{ padding:0 12px 40px; font-size:14px; }
    .contact-item{ font-size:13px; }
    .cookie-buttons button{ margin-left:6px; padding:6px 10px; font-size:13px; }
  }

  /* Smartphone piccolo (max 380px) */
  @media(max-width:380px){
    .molecule-scene{ width:290px; height:290px; }
    .node-center{ width:110px; height:110px; }
    .sat-node{ width:76px; height:76px; left:60px; top:-38px; }
  }
</style>
</head>
<body>

<main>

  <div class="molecule-scene" id="scene">

    <!-- SVG: orbita + linee + filtro glow -->
    <svg class="orbit-svg" id="orbitSvg" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- cerchio orbita -->
      <circle class="orbit-path" id="orbitCircle" cx="260" cy="260" r="185"/>

      <!-- linee connessione -->
      <line id="line1" class="connect-line"/>
      <line id="line2" class="connect-line" style="animation-delay:-3.3s"/>
      <line id="line3" class="connect-line" style="animation-delay:-6.6s"/>

      <!-- particelle -->
      <circle class="particle" r="4.5" id="p1">
        <animateMotion id="am1" dur="4.5s" repeatCount="indefinite" calcMode="linear"
          keyPoints="0;1;0" keyTimes="0;0.5;1"/>
      </circle>
      <circle class="particle" r="4.5" id="p2">
        <animateMotion id="am2" dur="5s" repeatCount="indefinite" calcMode="linear"
          keyPoints="0;1;0" keyTimes="0;0.5;1"/>
      </circle>
      <circle class="particle" r="4.5" id="p3">
        <animateMotion id="am3" dur="5.8s" repeatCount="indefinite" calcMode="linear"
          keyPoints="0;1;0" keyTimes="0;0.5;1"/>
      </circle>
    </svg>

    <!-- Nodo centrale -->
    <div class="node-center">
      <img src="Group2 no sfondo.png" alt="Doubleex Group">
    </div>

    <!-- Braccio 1 → Home -->
    <div class="orbit-arm orbit-arm-1">
      <a href="https://doubleexhome.com/" target="_blank" class="sat-node" id="sat1">
        <img src="Home2 no sfondo.png" alt="Doubleex Home">
      </a>
    </div>

    <!-- Braccio 2 → Roma Living -->
    <div class="orbit-arm orbit-arm-2">
      <a href="https://www.romaprimeliving.it/" target="_blank" class="sat-node" id="sat2">
        <img src="Romaliving2.png" alt="Roma Prime Living">
      </a>
    </div>

    <!-- Braccio 3 → Dinner in the Sky -->
    <div class="orbit-arm orbit-arm-3">
      <a href="https://dinnerinthesky.it/" target="_blank" class="sat-node" id="sat3">
        <img src="dinner2 no sfondo.png" alt="Dinner in the Sky">
      </a>
    </div>

  </div>

</main>

<footer>
  <div class="footer-border">
    <div class="footer-section">
      <h3>Contatti</h3>
      <div class="contact-item"><i class="fas fa-phone"></i> <a href="tel:+393755248477">+39 3755248477</a></div>
      <div class="contact-item"><i class="fas fa-at"></i> <a href="/cdn-cgi/l/email-protection#721b1c141d32161d07101e17170a15001d07025c111d1f"><span class="__cf_email__" data-cfemail="41282f272e01252e34232d24243926332e34316f222e2c">[email&#160;protected]</span></a></div>
      <div class="contact-item"><i class="fas fa-location-dot"></i> <a href="https://www.google.com/maps/search/?api=1&query=Via+Pomarico+58+00178+Roma" target="_blank" rel="noopener">Via Pomarico 58, 00178 Roma</a></div>
    </div>
    <div class="footer-bottom">
      © 2026 Doubleexgroup LTD |
      <a onclick="openModal('privacy')">Privacy</a> |
      <a onclick="openModal('cookie')">Cookie</a> |
      <a onclick="openModal('termini')">Termini</a>
    </div>
  </div>
</footer>

<div id="modal">
  <div class="modal-box">
    <h2 id="title"></h2>
    <div id="text"></div>
    <br>
    <button onclick="closeModal()">Chiudi</button>
  </div>
</div>

<div id="cookieBanner">
  <span>Utilizziamo cookie tecnici e, previo consenso, cookie di analisi e marketing.</span>
  <div class="cookie-buttons">
    <button class="accept" onclick="acceptCookies()">Accetta</button>
    <button class="reject" onclick="rejectCookies()">Rifiuta</button>
  </div>
</div>

<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
/* ────────────────────────────────────────────────────
   Linee di connessione calcolate trigonometricamente.
   Non usiamo getBoundingClientRect sui nodi animati
   (inaffidabile durante CSS animation).
   Calcoliamo l'angolo corrente in base al tempo e
   posizioniamo i punti su una circonferenza.
──────────────────────────────────────────────────── */

const ORBIT_DURATION = 70000; // ms — deve corrispondere al CSS (70s)
const OFFSETS = [0, 1/3, 2/3]; // tre satelliti equidistanti

const lines = [
  document.getElementById('line1'),
  document.getElementById('line2'),
  document.getElementById('line3'),
];
const ams = [
  document.getElementById('am1'),
  document.getElementById('am2'),
  document.getElementById('am3'),
];
const orbitCircle = document.getElementById('orbitCircle');
const scene = document.getElementById('scene');

let startTime = null;

// raggi dei cerchi in px (metà dimensioni CSS), scalati proporzionalmente
const R_CENTER_BASE = 130; // 260px / 2
const R_SAT_BASE    = 85;  // 170px / 2

function tick(ts) {
  if (!startTime) startTime = ts;

  const W = scene.offsetWidth;
  const H = scene.offsetHeight;
  const cx = W / 2;
  const cy = H / 2;
  const R  = W * 0.344;

  const scale   = W / 640;
  const rCenter = R_CENTER_BASE * scale;
  const rSat    = R_SAT_BASE    * scale;

  // aggiorna cerchio orbita
  orbitCircle.setAttribute('cx', cx);
  orbitCircle.setAttribute('cy', cy);
  orbitCircle.setAttribute('r',  R);

  const elapsed = ts - startTime;
  const progress = (elapsed % ORBIT_DURATION) / ORBIT_DURATION;

  OFFSETS.forEach((offset, i) => {
    const angle = (progress + offset) * Math.PI * 2 - Math.PI / 2;
    const sx = cx + R * Math.cos(angle);
    const sy = cy + R * Math.sin(angle);

    // vettore unitario centro → satellite
    const dx = sx - cx, dy = sy - cy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const ux = dx / dist, uy = dy / dist;

    // punti fermati al bordo dei cerchi
    const x1 = cx + ux * rCenter;
    const y1 = cy + uy * rCenter;
    const x2 = sx - ux * rSat;
    const y2 = sy - uy * rSat;

    lines[i].setAttribute('x1', x1); lines[i].setAttribute('y1', y1);
    lines[i].setAttribute('x2', x2); lines[i].setAttribute('y2', y2);

    // particella percorre solo il tratto tra i bordi
    ams[i].setAttribute('path', `M ${x1},${y1} L ${x2},${y2}`);
  });

  requestAnimationFrame(tick);
}

requestAnimationFrame(tick);

/* ── Modal ── */
function openModal(type){
  const t=document.getElementById("title"), c=document.getElementById("text");
  if(type==="privacy"){ t.innerText="Privacy Policy"; c.innerHTML="Questo sito non raccoglie direttamente dati personali."; }
  if(type==="cookie") { t.innerText="Cookie Policy";  c.innerHTML="Il sito utilizza cookie tecnici necessari."; }
  if(type==="termini"){ t.innerText="Termini";        c.innerHTML="Questo sito ha finalità informativa."; }
  document.getElementById("modal").style.display="flex";
}
function closeModal(){ document.getElementById("modal").style.display="none"; }

/* ── Cookie ── */
function acceptCookies(){ localStorage.setItem("cookies","accepted"); document.getElementById("cookieBanner").style.display="none"; }
function rejectCookies(){ localStorage.setItem("cookies","rejected"); document.getElementById("cookieBanner").style.display="none"; }
window.onload=function(){
  const status=localStorage.getItem("cookies");
  if(status!=="accepted"&&status!=="rejected"){ document.getElementById("cookieBanner").style.display="flex"; }
};
</script>
</body>
</html>
