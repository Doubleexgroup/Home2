<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Doubleex Group</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
background:url("sfondogrigio.jpg") center/cover no-repeat fixed;
color:white;
display:flex;
flex-direction:column;
min-height:100vh;
}

/* MAIN */

main{

flex:1;

display:flex;

justify-content:center;

align-items:center;

padding:40px;

}

/* GRID MOLECOLA */

.molecule{

position:relative;

width:800px;

max-width:95vw;

display:grid;

grid-template-columns:1fr 1fr 1fr;

grid-template-rows:auto auto auto;

justify-items:center;

align-items:center;

}

/* LINEE */

.lines{

position:absolute;

top:0;

left:0;

width:100%;

height:100%;

pointer-events:none;

}

/* LOGHI */

.logo img{

transition:.35s;

}

.logo img:hover{

transform:scale(1.15);

filter:
drop-shadow(0 0 12px rgba(255,255,255,0.9))
drop-shadow(0 0 25px rgba(255,255,255,0.5));

}

/* POSIZIONI GRID */

.main-logo{

grid-column:2;

grid-row:1;

}

.main-logo img{

width:420px;

}

.home{

grid-column:1;

grid-row:2;

}

.home img{

width:200px;

}

.roma{

grid-column:3;

grid-row:2;

}

.roma img{

width:200px;

}

.dinner{

grid-column:2;

grid-row:3;

}

.dinner img{

width:260px;

}

/* FOOTER */

footer{

padding:35px 20px;

text-align:center;

color:#561b6d;

border-top:1px solid #561b6d;

margin-bottom:50px;

}

.footer-bottom{

border-top:1px solid rgba(255,255,255,0.2);

padding-top:10px;

font-size:0.85rem;

}

.footer-bottom a{

cursor:pointer;

color:#561b6d;

text-decoration:none;

}

.footer-bottom a:hover{

color:#54196d;

}

</style>

</head>

<body>

<main>

<div class="molecule">

<svg class="lines" viewBox="0 0 800 500">

<line x1="400" y1="90" x2="160" y2="250"
stroke="rgba(255,255,255,0.4)" stroke-width="2"/>

<line x1="400" y1="90" x2="640" y2="250"
stroke="rgba(255,255,255,0.4)" stroke-width="2"/>

<line x1="160" y1="250" x2="400" y2="420"
stroke="rgba(255,255,255,0.4)" stroke-width="2"/>

<line x1="640" y1="250" x2="400" y2="420"
stroke="rgba(255,255,255,0.4)" stroke-width="2"/>

</svg>

<div class="logo main-logo">
<img src="Group2 no sfondo.png">
</div>

<a href="https://doubleexhome.com" target="_blank" class="logo home">
<img src="Home2 no sfondo.png">
</a>

<a href="https://www.romaprimeliving.it" target="_blank" class="logo roma">
<img src="Romaliving2.png">
</a>

<a href="https://dinnerinthesky.it" target="_blank" class="logo dinner">
<img src="dinner2 no sfondo.png">
</a>

</div>

</main>

<footer>

<div>

<h3>Contatti</h3>

<div>
<i class="fas fa-phone"></i> +39 3755248477
</div>

<div>
<i class="fas fa-envelope"></i> info@doubleexgroup.com
</div>

<div>
<i class="fas fa-map-marker-alt"></i> Via Pomarico 58, 00178 Roma
</div>

</div>

<div class="footer-bottom">

© 2026 Doubleexgroup LTD |

<a onclick="alert('Privacy policy')">Privacy</a> |

<a onclick="alert('Cookie policy')">Cookie</a> |

<a onclick="alert('Termini')">Termini</a>

</div>

</footer>

</body>
</html>
