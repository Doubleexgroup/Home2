<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doubleex Group</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#ffffff;
text-align:center;
}

/* LOGO PRINCIPALE */

.main-logo{
margin-top:40px;
margin-bottom:80px;
}

.main-logo img{
max-width:280px;
}

/* STRUTTURA MOLECOLARE */

.molecule{
position:relative;
width:100%;
max-width:900px;
margin:auto;
padding-bottom:120px;
}

/* LINEA VERTICALE */

.molecule::before{
content:"";
position:absolute;
left:50%;
top:0;
bottom:0;
width:3px;
background:black;
transform:translateX(-50%);
}

/* NODO */

.node{
position:relative;
display:flex;
align-items:center;
margin:120px 0;
}

/* LINEE ORIZZONTALI */

.node::before{
content:"";
position:absolute;
height:3px;
background:black;
width:120px;
}

/* SINISTRA */

.left{
justify-content:flex-start;
}

.left::before{
right:50%;
}

/* DESTRA */

.right{
justify-content:flex-end;
}

.right::before{
left:50%;
}

/* LOGHI */

.node img{
width:120px;
height:120px;
object-fit:contain;
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
transition:transform .2s;
}

.node img:hover{
transform:scale(1.08);
}

/* RESPONSIVE */

@media(max-width:700px){

.node{
justify-content:center !important;
}

.node::before{
display:none;
}

}

</style>

</head>

<body>

<!-- LOGO PRINCIPALE -->

<div class="main-logo">
<img src="logo.png" alt="Doubleex Group">
</div>

<div class="molecule">

<!-- LOGO 1 -->

<div class="node left">
<a href="https://sito1.com">
<img src="logo1.png">
</a>
</div>

<!-- LOGO 2 -->

<div class="node right">
<a href="https://sito2.com">
<img src="logo2.png">
</a>
</div>

<!-- LOGO 3 -->

<div class="node left">
<a href="https://sito3.com">
<img src="logo3.png">
</a>
</div>

<!-- LOGO 4 -->

<div class="node right">
<a href="https://sito4.com">
<img src="logo4.png">
</a>
</div>

<!-- LOGO 5 (PRONTO PER IL FUTURO) -->

<!--
<div class="node left">
<a href="https://sito5.com">
<img src="logo5.png">
</a>
</div>
-->

</div>

</body>
</html>
