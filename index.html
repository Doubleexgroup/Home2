<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doubleex Group</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:white;
text-align:center;
}

header{
padding:40px 20px;
}

header img{
width:260px;
}

.section{
padding:60px 20px;
}

.grid{
display:grid;
grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
gap:80px;
max-width:1100px;
margin:auto;
position:relative;
}

.node{
position:relative;
display:flex;
flex-direction:column;
align-items:center;
}

.node img{
width:120px;
height:auto;
margin-bottom:10px;
z-index:2;
}

.node span{
font-weight:bold;
}

.grid::before{
content:"";
position:absolute;
top:50%;
left:0;
width:100%;
height:2px;
background:black;
z-index:0;
}

.node::before{
content:"";
position:absolute;
top:-40px;
left:50%;
width:2px;
height:40px;
background:black;
transform:translateX(-50%);
}

footer{
margin-top:80px;
padding:20px;
font-size:14px;
color:#666;
}

</style>

</head>


<body>

<header>
<img src="logo.png">
</header>

<section class="section">

<div class="grid">

<div class="node">
<img src="logo1.png">
<span>Doubleex Home</span>
</div>

<div class="node">
<img src="logo2.png">
<span>Doubleex AI</span>
</div>

<div class="node">
<img src="logo3.png">
<span>Doubleex Tech</span>
</div>

<div class="node">
<img src="logo4.png">
<span>Doubleex Media</span>
</div>

</div>

</section>

<footer>
© 2026 Doubleex Group
</footer>

</body>
</html>
