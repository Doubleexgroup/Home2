<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doubleex Group</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  :root{
    --accent:#e63946;
    --text:#ffffff;
  }

  html, body {
    margin:0; padding:0;
    height: 100vh;
    max-height: 100vh;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    color:var(--text);
    overflow: hidden;
    width: 100%;
  }

  body{
    background:url("sfondogrigio.jpg") center/cover no-repeat fixed;
    display:flex; flex-direction:column;
  }

  main{
    flex:1;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    text-align:center;
    padding: 0;
    width: 100%;
    box-sizing: border-box;
    overflow: hidden;
    min-height: 0;
  }

  /* ══ SCENA MOLECOLA ══ */
  .molecule-scene {
    position: relative;
    /* Dimensione calcolata via JS per stare sempre nel viewport */
    flex-shrink: 0;
  }

  .orbit-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    overflow: visible;
    pointer-events: none;
    z-index: 1;
  }

  .orbit-path {
    display: none;
  }

  .connect-line, .particle {
    display: none;
  }

  /* ── NODO CENTRALE ── */
  .node-center {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.10) 0%, rgba(255,255,255,0.02) 80%);
    border: 3px solid rgba(86,27,109,0.75);
    box-shadow:
      0 0 0 1px rgba(138,45,181,0.25),
      inset 0 0 18px rgba(86,27,109,0.18),
      0 0 18px rgba(86,27,109,0.30);
    backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    z-index: 5;
    animation: breathe 5s ease-in-out infinite alternate;
    /* Dimensioni impostate via JS */
  }

  .node-center img {
    width: 80%;
    pointer-events: none;
    user-select: none;
    filter: drop-shadow(0 0 10px rgba(255,255,255,0.25));
  }

  @keyframes breathe {
    from { box-shadow: 0 0 0 1px rgba(138,45,181,0.25), inset 0 0 18px rgba(86,27,109,0.18), 0 0 20px rgba(86,27,109,0.25); }
    to   { box-shadow: 0 0 0 2px rgba(138,45,181,0.45), inset 0 0 22px rgba(86,27,109,0.22), 0 0 55px rgba(86,27,109,0.50); }
  }

  /* ── NODO SATELLITE ── */
  .sat-node {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.09) 0%, rgba(255,255,255,0.02) 80%);
    border: 3px solid rgba(86,27,109,0.75);
    box-shadow:
      0 0 0 1px rgba(138,45,181,0.25),
      inset 0 0 18px rgba(86,27,109,0.18),
      0 0 18px rgba(86,27,109,0.30);
    backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    transition: box-shadow .3s, border-color .3s;
    cursor: pointer;
    text-decoration: none;
    pointer-events: all;
    z-index: 10;
    transform: translate(-50%, -50%);
    /* Dimensioni impostate via JS */
  }

  .sat-node:hover {
    border-color: rgba(138,45,181,0.95);
    box-shadow:
      0 0 0 2px rgba(138,45,181,0.50),
      0 0 35px rgba(138,45,181,0.55),
      0 0 70px rgba(86,27,109,0.25),
      inset 0 0 22px rgba(86,27,109,0.20);
  }

  .sat-node img {
    width: 78%;
    pointer-events: none;
    user-select: none;
    transition: filter .3s;
  }

  #sat2 img {
    width: 93%;
  }

  .sat-node:hover img {
    filter: drop-shadow(0 0 12px rgba(255,255,255,0.7));
  }

  .particle {
    fill: #8a2db5;
    filter: url(#glow);
  }

  /* ── FOOTER ── */
  footer{
    padding: 0 20px 10px;
    text-align:center;
    background:transparent; backdrop-filter:blur(3px);
    color:#561b6d;
    flex-shrink: 0;
  }
  .footer-border{
    border-top:1px solid #561b6d;
    padding-top: 8px; margin-bottom: 0;
  }
  .footer-section{ margin-bottom: 6px; }
  .footer-section h3{ color:#561b6d; margin:0 0 5px; font-size: 0.9rem; }
  .contact-item{
    color:#561b6d; margin-bottom: 4px;
    display:flex; align-items:center; justify-content:center; gap:8px;
    font-size: 0.85rem;
  }
  .contact-item a{ color:#561b6d; text-decoration:none; }
  .contact-item a:hover{ text-decoration:underline; color:#8a2db5; }
  .footer-bottom{
    border-top:1px solid rgba(86,27,109,0.25);
    padding-top: 6px; font-size:.8rem; color:#561b6d;
  }
  .footer-bottom a{ cursor:pointer; color:#561b6d; text-decoration:none; }
  .footer-bottom a:hover{ color:#54196d; }

  /* ══ MODAL ELEGANTE ══ */
  #modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.65);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    justify-content: center;
    align-items: center;
    z-index: 9999;
    padding: 20px;
    box-sizing: border-box;
  }

  #modal.visible {
    display: flex;
    animation: modalFadeIn .3s cubic-bezier(.16,1,.3,1) both;
  }

  @keyframes modalFadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .modal-box {
    background: rgba(12, 5, 20, 0.88);
    border: 1px solid rgba(138, 45, 181, 0.45);
    border-radius: 20px;
    padding: 36px 40px 32px;
    max-width: 560px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow:
      0 0 0 1px rgba(138,45,181,0.15),
      0 24px 80px rgba(0,0,0,0.6),
      0 0 60px rgba(86,27,109,0.25),
      inset 0 1px 0 rgba(255,255,255,0.06);
    animation: modalSlideUp .35s cubic-bezier(.16,1,.3,1) both;
    position: relative;
  }

  @keyframes modalSlideUp {
    from { opacity: 0; transform: translateY(24px) scale(.97); }
    to   { opacity: 1; transform: translateY(0)    scale(1); }
  }

  .modal-box::-webkit-scrollbar { width: 4px; }
  .modal-box::-webkit-scrollbar-track { background: transparent; }
  .modal-box::-webkit-scrollbar-thumb { background: rgba(138,45,181,0.4); border-radius: 2px; }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    padding-bottom: 18px;
    border-bottom: 1px solid rgba(138,45,181,0.25);
  }

  .modal-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: rgba(138,45,181,0.18);
    border: 1px solid rgba(138,45,181,0.35);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  #modal-title {
    font-size: 1.15rem;
    font-weight: 600;
    letter-spacing: .02em;
    color: rgba(255,255,255,0.95);
    margin: 0 0 0 12px;
    flex: 1;
    text-align: left;
  }

  .modal-close {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.10);
    color: rgba(255,255,255,0.5);
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s, color .2s, border-color .2s;
    flex-shrink: 0;
  }

  .modal-close:hover {
    background: rgba(138,45,181,0.25);
    border-color: rgba(138,45,181,0.50);
    color: #fff;
  }

  #modal-text {
    color: rgba(255,255,255,0.72);
    font-size: .92rem;
    line-height: 1.75;
    text-align: left;
  }

  #modal-text h4 {
    color: rgba(255,255,255,0.90);
    font-size: .95rem;
    margin: 20px 0 8px;
    font-weight: 600;
  }

  #modal-text p { margin: 0 0 12px; }

  .modal-footer {
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid rgba(138,45,181,0.20);
    display: flex;
    justify-content: flex-end;
  }

  .modal-btn {
    padding: 10px 28px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #7b2fbe, #561b6d);
    color: #fff;
    font-size: .88rem;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(86,27,109,0.45);
    transition: background .2s, box-shadow .2s, transform .15s;
    letter-spacing: .02em;
  }

  .modal-btn:hover {
    background: linear-gradient(135deg, #9b3fe0, #6e22a0);
    box-shadow: 0 6px 22px rgba(86,27,109,0.65);
    transform: translateY(-1px);
  }

  .modal-btn:active { transform: scale(.97); }

  /* ── COOKIE BANNER ── */
  #cookieBanner {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 320px;
    background: rgba(12, 5, 20, 0.88);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(86,27,109,0.55);
    border-radius: 18px;
    padding: 22px 22px 18px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(138,45,181,0.12), 0 0 30px rgba(86,27,109,0.2);
    z-index: 9998;
    display: none;
    flex-direction: column;
    gap: 16px;
    animation: cookieSlide .45s cubic-bezier(.16,1,.3,1) both;
  }

  @keyframes cookieSlide {
    from { opacity:0; transform: translateY(20px) scale(.97); }
    to   { opacity:1; transform: translateY(0)    scale(1);   }
  }

  #cookieBanner .cookie-icon { font-size: 1.5rem; margin-bottom: 2px; }
  #cookieBanner .cookie-title {
    font-size: .78rem; font-weight: 700;
    letter-spacing: .08em; text-transform: uppercase;
    color: rgba(138,45,181,0.9); margin-bottom: 4px;
  }
  #cookieBanner .cookie-text {
    font-size: .82rem; line-height: 1.55;
    color: rgba(255,255,255,0.72);
  }
  #cookieBanner .cookie-actions { display: flex; gap: 10px; margin-top: 2px; }
  #cookieBanner .cookie-actions button {
    flex: 1; padding: 9px 0; border: none;
    border-radius: 10px; font-size: .82rem; font-weight: 600;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s, background .2s;
  }
  #cookieBanner .cookie-actions button:active { transform: scale(.96); }
  #cookieBanner .btn-accept {
    background: linear-gradient(135deg, #7b2fbe, #561b6d);
    color: #fff;
    box-shadow: 0 4px 14px rgba(86,27,109,0.45);
  }
  #cookieBanner .btn-accept:hover {
    background: linear-gradient(135deg, #9b3fe0, #6e22a0);
    box-shadow: 0 6px 20px rgba(86,27,109,0.65);
  }
  #cookieBanner .btn-reject {
    background: rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.55);
    border: 1px solid rgba(255,255,255,0.12) !important;
  }
  #cookieBanner .btn-reject:hover {
    background: rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.75);
  }

  @media(max-width:400px){
    #cookieBanner{ right:12px; bottom:12px; width: calc(100vw - 24px); }
  }

  @media(max-width:600px){
    footer{ padding:0 12px 8px; font-size:13px; }
    .contact-item{ font-size:12px; }
    .modal-box{ padding: 24px 22px 20px; }
    .footer-section h3 { font-size: 0.82rem; }
  }
</style>
</head>
<body>

<main>
  <div class="molecule-scene" id="scene">

    <svg class="orbit-svg" id="orbitSvg" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <circle class="orbit-path" id="orbitCircle1" cx="550" cy="550" r="340"/>
      <circle class="orbit-path" id="orbitCircle2" cx="550" cy="550" r="430"/>
      <circle class="orbit-path" id="orbitCircle3" cx="550" cy="550" r="510"/>
      <line id="line1" class="connect-line"/>
      <line id="line2" class="connect-line" style="animation-delay:-3.3s"/>
      <line id="line3" class="connect-line" style="animation-delay:-6.6s"/>
      <circle class="particle" r="5" id="p1">
        <animateMotion id="am1" dur="4.5s" repeatCount="indefinite" calcMode="linear" keyPoints="0;1;0" keyTimes="0;0.5;1"/>
      </circle>
      <circle class="particle" r="5" id="p2">
        <animateMotion id="am2" dur="5.2s" repeatCount="indefinite" calcMode="linear" keyPoints="0;1;0" keyTimes="0;0.5;1"/>
      </circle>
      <circle class="particle" r="5" id="p3">
        <animateMotion id="am3" dur="5.8s" repeatCount="indefinite" calcMode="linear" keyPoints="0;1;0" keyTimes="0;0.5;1"/>
      </circle>
    </svg>

    <div class="node-center" id="nodeCenter">
      <img src="Group2 no sfondo.png" alt="Doubleex Group">
    </div>

    <a href="https://doubleexhome.com/" target="_blank" class="sat-node" id="sat1">
      <img src="Home2 no sfondo.png" alt="Doubleex Home">
    </a>
    <a href="https://www.romaprimeliving.it/" target="_blank" class="sat-node" id="sat2">
      <img src="Living-no-sfondo.png" alt="Roma Prime Living">
    </a>
    <a href="https://dinnerinthesky.it/" target="_blank" class="sat-node" id="sat3">
      <img src="dinner2 no sfondo.png" alt="Dinner in the Sky">
    </a>

  </div>
</main>

<footer>
  <div class="footer-border">
    <div class="footer-section">
      <h3>Contatti</h3>
      <div class="contact-item"><i class="fas fa-phone"></i> <a href="tel:+393755248477">+39 3755248477</a></div>
      <div class="contact-item"><i class="fas fa-at"></i> <a href="mailto:info@doubleexgroup.com">info@doubleexgroup.com</a></div>
      <div class="contact-item"><i class="fas fa-location-dot"></i> <a href="https://www.google.com/maps/search/?api=1&query=Via+Pomarico+58+00178+Roma" target="_blank" rel="noopener">Via Pomarico 58, 00178 Roma</a></div>
    </div>
    <div class="footer-bottom">
      © 2026 Doubleexgroup LTD |
      <a onclick="openModal('privacy')">Privacy</a> |
      <a onclick="openModal('cookie')">Cookie</a> |
      <a onclick="openModal('termini')">Termini</a>
    </div>
  </div>
</footer>

<!-- MODAL ELEGANTE -->
<div id="modal" onclick="handleModalOutsideClick(event)">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-icon" id="modal-icon">🔒</div>
      <h2 id="modal-title"></h2>
      <button class="modal-close" onclick="closeModal()" aria-label="Chiudi">×</button>
    </div>
    <div id="modal-text"></div>
    <div class="modal-footer">

<!-- COOKIE BANNER -->
<div id="cookieBanner">
  <div>
    <div class="cookie-icon">🍪</div>
    <div class="cookie-title">Cookie &amp; Privacy</div>
    <div class="cookie-text">Utilizziamo cookie tecnici e, previo consenso, cookie di analisi e marketing per migliorare la tua esperienza.</div>
  </div>
  <div class="cookie-actions">
    <button class="btn-accept" onclick="acceptCookies()">Accetta</button>
    <button class="btn-reject" onclick="rejectCookies()">Rifiuta</button>
  </div>
</div>

<script>
  /*
    LAYOUT NO-SCROLL:
    - Il footer ha altezza fissa.
    - Lo spazio rimanente (100vh - footerH) viene usato per calcolare
      la dimensione massima della scena molecolare.
    - nodeCenter e sat-node ricevono dimensioni calcolate proporzionalmente.
    - Il resto della logica orbitale (angoli, pulse, linee) è identico all'originale.
  */

  const ORBIT_BASE   = 0.37;
  const ORBIT_AMP    = 0.09;
  const PULSE_PERIOD = 18000;
  const DURATION     = 220000;

  const scene      = document.getElementById('scene');
  const nodeCenter = document.getElementById('nodeCenter');
  const footer     = document.querySelector('footer');

  const orbitCircles = [
    document.getElementById('orbitCircle1'),
    document.getElementById('orbitCircle2'),
    document.getElementById('orbitCircle3'),
  ];

  let startTime = null;
  let sceneSize = 0;
  let nodeCenterSize = 0;
  let satSize = 0;

  function computeSizes() {
    const footerH = footer.offsetHeight;

    // Usa la risoluzione reale del monitor per il calcolo 16:9
    const screenW = window.screen.width;
    const screenH = window.screen.height;

    // Rapporto pixel reale dello schermo
    const screenRatio = screenW / screenH;

    // Se il monitor è più largo di 16:9 (es. ultrawide), l'altezza utile è vincolata
    // Se è più stretto (es. verticale/tablet), la larghezza è il vincolo
    const ratio16_9 = 16 / 9;

    let effectiveH;
    if (screenRatio >= ratio16_9) {
      // Monitor wide o 16:9: l'altezza disponibile è quella reale del browser
      effectiveH = window.innerHeight;
    } else {
      // Monitor più "alto" (4:3, tablet verticale): calcoliamo l'altezza come se fosse 16:9 su quella larghezza
      effectiveH = window.innerWidth / ratio16_9;
      // Ma non può superare il viewport reale
      effectiveH = Math.min(effectiveH, window.innerHeight);
    }

    const availH = effectiveH - footerH;
    const availW = window.innerWidth;

    // La scena è quadrata: prende il minimo tra larghezza e altezza disponibile
    sceneSize = Math.min(availW * 0.96, availH * 0.96, 1100);

    nodeCenterSize = sceneSize * (600 / 1100);
    satSize        = sceneSize * (240 / 1100);

    scene.style.width  = sceneSize + 'px';
    scene.style.height = sceneSize + 'px';

    nodeCenter.style.width  = nodeCenterSize + 'px';
    nodeCenter.style.height = nodeCenterSize + 'px';

    ['sat1','sat2','sat3'].forEach(id => {
      const el = document.getElementById(id);
      el.style.width  = satSize + 'px';
      el.style.height = satSize + 'px';
    });
  }

  function tick(ts) {
    if (!startTime) startTime = ts;

    computeSizes();

    const W  = sceneSize;
    const cx = W / 2;
    const cy = W / 2;
    const elapsed = ts - startTime;

    const pulse   = Math.sin((elapsed / PULSE_PERIOD) * Math.PI * 2);
    const rCenter = nodeCenterSize / 2;
    const rSat    = satSize / 2;

    const R_raw = W * (ORBIT_BASE + ORBIT_AMP * pulse);
    const R_min = rCenter + rSat + 6;
    const R_MAX = W * 0.5 - rSat - 6;
    const R     = Math.min(R_MAX, Math.max(R_min, R_raw));

    const progress  = (elapsed % DURATION) / DURATION;
    const baseAngle = progress * Math.PI * 2 - Math.PI / 2;

    const angles = [
      baseAngle,
      baseAngle + (Math.PI * 2 / 3),
      baseAngle + (Math.PI * 4 / 3),
    ];

    const ids     = ['sat1', 'sat2', 'sat3'];
    const lineIds = ['line1', 'line2', 'line3'];
    const amIds   = ['am1', 'am2', 'am3'];

    ids.forEach((id, i) => {
      const satEl  = document.getElementById(id);
      const lineEl = document.getElementById(lineIds[i]);
      const amEl   = document.getElementById(amIds[i]);

      orbitCircles[i].setAttribute('cx', cx);
      orbitCircles[i].setAttribute('cy', cy);
      orbitCircles[i].setAttribute('r',  R);

      const angle = angles[i];
      const sx = cx + R * Math.cos(angle);
      const sy = cy + R * Math.sin(angle);

      satEl.style.left = sx + 'px';
      satEl.style.top  = sy + 'px';

      const dx   = sx - cx, dy = sy - cy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const ux   = dx / dist, uy = dy / dist;

      const x1 = cx + ux * rCenter;
      const y1 = cy + uy * rCenter;
      const x2 = sx - ux * rSat;
      const y2 = sy - uy * rSat;

      lineEl.setAttribute('x1', x1); lineEl.setAttribute('y1', y1);
      lineEl.setAttribute('x2', x2); lineEl.setAttribute('y2', y2);
      amEl.setAttribute('path', `M ${x1},${y1} L ${x2},${y2}`);
    });

    requestAnimationFrame(tick);
  }

  // Calcola subito le dimensioni prima del primo frame
  computeSizes();
  requestAnimationFrame(tick);

  // Ricalcola su resize (es. rotazione mobile)
  window.addEventListener('resize', computeSizes);

  /* ── Modal ── */
  const MODAL_CONTENT = {
    privacy: {
      icon: '🔒',
      title: 'Privacy Policy',
      html: `
        <p>Doubleex Group LTD rispetta la tua privacy e si impegna a proteggere i dati personali degli utenti in conformità al <strong>Regolamento UE 2016/679 (GDPR)</strong>.</p>
        <h4>Dati raccolti</h4>
        <p>Questo sito non raccoglie direttamente dati personali degli utenti. Eventuali dati forniti volontariamente tramite i moduli di contatto (nome, email, telefono) sono trattati esclusivamente per rispondere alle richieste ricevute.</p>
        <h4>Finalità del trattamento</h4>
        <p>I dati raccolti sono utilizzati unicamente per finalità informative e di risposta alle comunicazioni. Non vengono ceduti a terzi né utilizzati per finalità di marketing senza previo consenso.</p>
        <h4>Diritti dell'utente</h4>
        <p>L'utente ha il diritto di accedere, rettificare, cancellare i propri dati e di revocare il consenso in qualsiasi momento, scrivendo a <a href="mailto:info@doubleexgroup.com" style="color:rgba(138,45,181,0.9)">info@doubleexgroup.com</a>.</p>
      `
    },
    cookie: {
      icon: '🍪',
      title: 'Cookie Policy',

  function openModal(type) {
    const content = MODAL_CONTENT[type];
    if (!content) return;
    document.getElementById('modal-icon').textContent = content.icon;
    document.getElementById('modal-title').textContent = content.title;
    document.getElementById('modal-text').innerHTML = content.html;
    const modal = document.getElementById('modal');
    modal.classList.add('visible');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    const modal = document.getElementById('modal');
    modal.classList.remove('visible');
    document.body.style.overflow = 'hidden'; // mantieni no-scroll anche dopo chiusura modal
  }

  function handleModalOutsideClick(e) {
    if (e.target === document.getElementById('modal')) closeModal();
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
  });

  /* ── Cookie banner ── */
  function acceptCookies() {
    localStorage.setItem('doubleex_cookies', 'accepted');
    hideCookieBanner();
  }

  function rejectCookies() {
    localStorage.setItem('doubleex_cookies', 'rejected');
    hideCookieBanner();
  }

  function hideCookieBanner() {
    const b = document.getElementById('cookieBanner');
    b.style.transition = 'opacity .35s, transform .35s';
    b.style.opacity = '0';
    b.style.transform = 'translateY(16px) scale(.97)';
    setTimeout(() => { b.style.display = 'none'; }, 370);
  }

  function showCookieBanner() {
    const b = document.getElementById('cookieBanner');
    b.style.display = 'flex';
  }

  document.addEventListener('DOMContentLoaded', function() {
    const status = localStorage.getItem('doubleex_cookies');
    if (status !== 'accepted' && status !== 'rejected') {
      setTimeout(showCookieBanner, 600);
    }
  });
</script>
